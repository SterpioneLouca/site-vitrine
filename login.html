<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - RegenUp</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, rgba(5, 5, 5, 0.9) 0%, rgba(26, 26, 46, 0.9) 50%, rgba(15, 61, 26, 0.9) 100%);
            margin-bottom: 0;
        }

        .login-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3d1a 100%);
            border: 2px solid var(--primary-dark);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(76,175,80,0.3);
            max-width: 450px;
            width: 100%;
            animation: slideInUp 0.5s ease forwards;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 2.5rem;
            color: #81C784;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .login-header p {
            color: #aaa;
            font-size: 1.1rem;
        }

        .logo-login {
            height: 80px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: #81C784;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--primary-dark);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(102, 187, 106, 0.1);
            box-shadow: 0 0 15px rgba(102, 187, 106, 0.3);
        }

        .form-group input:valid {
            border-color: var(--accent);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-size: 0.95rem;
            color: #aaa;
        }

        .forgot-password {
            text-align: right;
            margin-top: 10px;
        }

        .forgot-password a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .forgot-password a:hover {
            color: #81C784;
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--accent) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(76,175,80,0.3);
            letter-spacing: 1px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(76,175,80,0.5);
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 30px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(102, 187, 106, 0.3);
        }

        .divider span {
            color: #aaa;
            font-size: 0.9rem;
        }

        .signup-link {
            text-align: center;
            color: #aaa;
            margin-top: 25px;
        }

        .signup-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: #81C784;
        }

        .error-message {
            display: none;
            background: rgba(255, 107, 107, 0.2);
            border-left: 4px solid #ff6b6b;
            color: #ff6b6b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: slideDown 0.3s ease;
        }

        .success-message {
            display: none;
            background: rgba(102, 187, 106, 0.2);
            border-left: 4px solid var(--accent);
            color: #81C784;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .social-login {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--primary-dark);
            background: rgba(27, 94, 32, 0.2);
            color: #81C784;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .social-btn:hover {
            background: var(--primary-dark);
            color: white;
            border-color: var(--accent);
        }

        .loading {
            display: none;
            font-size: 2rem;
            color: var(--accent);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .login-card {
                padding: 35px 25px;
            }

            .login-header h1 {
                font-size: 2rem;
            }

            .form-group input {
                padding: 12px 14px;
                font-size: 16px;
            }
        }

        body {
            padding-bottom: 0 !important;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <header class="header">
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo-section">
                    <a href="index.html" style="display: flex; align-items: center; gap: 15px; text-decoration: none;">
                        <img src="Capture d'écran 2026-01-13 114353.png" alt="RegenUp Logo" class="logo">
                        <span class="brand-name">REGENUP</span>
                    </a>
                </div>
                
                <button class="menu-toggle" id="menuToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                
                <ul class="nav-menu" id="navMenu">
                    <li><a href="index.html#accueil">Accueil</a></li>
                    <li><a href="index.html#produits">Produits</a></li>
                    <li><a href="equipe.html">Équipe</a></li>
                    <li><a href="index.html#contact">Contact</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- Formulaire de Connexion -->
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Connexion</h1>
                <p>Accédez à votre espace client</p>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Adresse Email
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="votre.email@exemple.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Mot de passe
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Se souvenir de moi</label>
                </div>

                <div class="forgot-password">
                    <a href="#" onclick="showForgotPassword(event)">Mot de passe oublié?</a>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Se connecter
                </button>
            </form>

            <div class="divider">
                <span>OU</span>
            </div>

            <div class="social-login">
                <button class="social-btn" onclick="loginGoogle(event)">
                    <i class="fab fa-google"></i> Google
                </button>
                <button class="social-btn" onclick="loginFacebook(event)">
                    <i class="fab fa-facebook"></i> Facebook
                </button>
            </div>

            <div class="signup-link">
                Pas encore de compte? 
                <a href="#" onclick="showSignup(event)">S'inscrire</a>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Setup menu mobile
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        
        menuToggle?.addEventListener('click', function() {
            navMenu?.classList.toggle('active');
        });

        document.querySelectorAll('.nav-menu a').forEach(link => {
            link.addEventListener('click', function() {
                navMenu?.classList.remove('active');
            });
        });
    </script>
</body>
</html>
